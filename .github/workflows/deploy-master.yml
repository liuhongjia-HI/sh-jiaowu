name: Deploy master

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: starline-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/starline
  API_PORT: "8892"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: learning-api/go.sum

      - name: Test API
        working-directory: learning-api
        run: go test ./...

      - name: Build API
        working-directory: learning-api
        run: |
          mkdir -p ../build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../build/learning-api ./cmd/api

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Package release
        run: |
          RELEASE_DIR="release/${GITHUB_SHA}"
          mkdir -p "$RELEASE_DIR/learning-api" "$RELEASE_DIR/web" "$RELEASE_DIR/deploy"
          cp build/learning-api "$RELEASE_DIR/learning-api/learning-api"
          cp -R web/dist "$RELEASE_DIR/web/dist"
          cp -R deploy/production "$RELEASE_DIR/deploy/production"
          chmod +x "$RELEASE_DIR/learning-api/learning-api"
          chmod +x "$RELEASE_DIR/deploy/production/activate-release.sh"

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/releases/${GITHUB_SHA}'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" "release/${GITHUB_SHA}/" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/releases/${GITHUB_SHA}/"

      - name: Activate release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "STARLINE_API_PORT='$API_PORT' '$DEPLOY_PATH/releases/${GITHUB_SHA}/deploy/production/activate-release.sh' '$DEPLOY_PATH' '${GITHUB_SHA}'"
