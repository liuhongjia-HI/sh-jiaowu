services:
  mysql:
    image: mysql:8.0
    container_name: starline-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: starline
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3317:3306"
    volumes:
      - starline_mysql_data:/var/lib/mysql
      - ./learning-api/deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: starline-redis
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: starline-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app123
      RABBITMQ_DEFAULT_VHOST: starline
    ports:
      - "5674:5672"
      - "15674:15672"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: starline-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8849:8848"
      - "9849:9848"

volumes:
  starline_mysql_data:
