server {
    listen 443 ssl http2;
    server_name sa.starlineeducation.com.cn;

    ssl_certificate /etc/ssl/starline/sa.starlineeducation.com.cn.pem;
    ssl_certificate_key /etc/ssl/starline/sa.starlineeducation.com.cn.key;

    root /opt/starline/current/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8892/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name gate.starlineeducation.com.cn;

    ssl_certificate /etc/ssl/starline/gate.starlineeducation.com.cn.pem;
    ssl_certificate_key /etc/ssl/starline/gate.starlineeducation.com.cn.key;

    location /api/ {
        proxy_pass http://127.0.0.1:8892/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
